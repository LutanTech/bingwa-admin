<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bingwa Sokoni | Admin Login</title>
    <style>
        :root {
            --bg-pastel: #a5c3f7;
            --card-glass: rgba(255, 255, 255, 0.7);
            --accent-cyan: #00f2ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-pastel);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: url(/assets/images/lp.webp);
        }

        .login-card {
            background: rgba(0, 0, 0, 0.179);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 3px;
            width: 100%;
            max-width: 400px;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.152);
            box-shadow: 0 20px 50px rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
        }

        p {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.6;
            margin-bottom: 2rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 2px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.626);
            font-family: inherit;
            outline: none;
            transition: 0.2s;
        }

        input:focus {
            border-color: var(--accent-cyan);
            background: white;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            background: #111;
            color: #fff;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-login:hover { background: #333; }

        .toast {
            position: fixed; top: 2rem; right: 2rem;
            padding: 15px 25px; border-radius: 5px;
            background: white; color: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
            z-index: 1000;
        }

        .error { background: #ff4d4d; color: white; }
        .success { background: #ccff00; color: black; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>BINGWA</h1>
    <p>Admin Intelligence Access</p>
    
    <div class="input-group">
        <input type="text" id="username" placeholder="Username">
    </div>
    <div class="input-group">
        <input type="password" id="password" placeholder="Password">
    </div>

    <label class="remember-me">
        <input type="checkbox" id="remember"> Remember this session
    </label>

    <button class="btn-login" id="login-btn">AUTHORIZE ACCESS</button>
</div>

<div id="toast" class="toast"></div>

<script>
    const baseUrl = window.location.origin.startsWith('https') ? 'https://bingwadeals.eu.pythonanywhere.com' : 'http://127.0.0.1:5000';

    function setCookie(name, value, days) {
        let expires = "";
        if (days) {
            const date = new Date();
            date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
            expires = "; expires=" + date.toUTCString();
        }
        document.cookie = name + "=" + (value || "") + expires + "; path=/";
    }

    function showToast(type, msg) {
        const t = document.getElementById('toast');
        t.className = `toast ${type}`;
        t.textContent = msg;
        t.style.display = 'block';
        setTimeout(() => { t.style.display = 'none'; }, 5000);
    }

    document.getElementById('login-btn').addEventListener('click', async () => {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const remember = document.getElementById('remember').checked;

        if (!username || !password) {
            showToast('error', 'Fields cannot be empty');
            return;
        }

        try {
            const response = await fetch(`${baseUrl}/admin/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password, remember })
            });

            const data = await response.json();

            if (data.status === 'success') {
                const expiry = remember ? 30 : 1;
                setCookie('id', data.id, expiry);
                setCookie('token', data.token, expiry);
                
                showToast('success', data.message);
                setTimeout(() => { window.location.href = '/portal'; }, 10);
            } else {
                showToast('error', data.message);
            }
        } catch (err) {
            showToast('error', 'Neural link failed. Check local server.');
        }
    });
</script>

</body>
</html>
